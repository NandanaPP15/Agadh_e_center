<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Agadh</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { background: #1e4a8b; color: white; padding: 1rem; }
        .service-card { background: white; border-radius: 10px; padding: 1.5rem; margin: 1rem 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-link { color: #1e4a8b; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>Government Services</h1>
        </div>
    </div>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <div id="services-list">
            <!-- Services will be loaded by JavaScript -->
            <p>Loading services...</p>
        </div>
    </div>
    <script>
        // Load services from API
        fetch('/api/services/')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('services-list');
                container.innerHTML = '';
                
                if (data.results) {
                    data.results.forEach(service => {
                        const card = document.createElement('div');
                        card.className = 'service-card';
                        card.innerHTML = `
                            <h3>${service.name}</h3>
                            <p>${service.description}</p>
                            <p><strong>Department:</strong> ${service.department}</p>
                            <p><strong>Fee:</strong> ₹${service.fee}</p>
                            <p><strong>Processing Time:</strong> ${service.processing_time}</p>
                            <a href="/services/${service.slug}/">View Details</a>
                        `;
                        container.appendChild(card);
                    });
                }
            })
            .catch(error => {
                document.getElementById('services-list').innerHTML = 
                    '<p>Error loading services. Please try again later.</p>';
            });
    </script>
</body>
</html>
