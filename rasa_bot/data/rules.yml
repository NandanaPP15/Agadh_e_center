version: "3.1"

rules:
- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'You are welcome' when the user says thank you
  steps:
  - intent: thank_you
  - action: utter_thank_you

- rule: Greet the user
  steps:
  - intent: greet
  - action: action_greet

- rule: Provide service information
  steps:
  - intent: ask_services
  - action: utter_ask_services

- rule: Handle document inquiries
  steps:
  - intent: ask_documents
  - action: action_get_service_documents

- rule: Fallback for out of scope
  steps:
  - intent: out_of_scope
  - action: action_fallback