version: "3.1"

rules:

- rule: Greet user
  steps:
    - intent: greet
    - action: utter_greet

- rule: Start voter id flow
  steps:
    - intent: apply_new_voter_id
    - action: utter_apply_new_voter_id

- rule: Age provided
  steps:
    - intent: provide_age
    - action: utter_age_eligible

- rule: Show documents
  steps:
    - intent: required_documents
    - action: utter_documents

- rule: Processing time
  steps:
    - intent: processing_time
    - action: utter_processing_time

- rule: Correction flow
  steps:
    - intent: correction_voter_id
    - action: utter_correction

- rule: Fallback
  steps:
    - intent: nlu_fallback
    - action: utter_fallback
